<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Command Center V4.1</title>

<style>
body {margin:0;background:#0b0f14;color:#e6edf3;font-family:system-ui;}
.wrap {max-width:700px;margin:auto;padding:15px;}
.title {font-size:26px;font-weight:800;margin-bottom:5px;}
.sub {color:#9da7b3;font-size:13px;margin-bottom:12px;}

.card {
  background:#161b22;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.grid {display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.stat {background:#111821;padding:10px;border-radius:10px;}
.stat-title {font-size:12px;color:#9da7b3;}
.stat-value {font-size:20px;font-weight:800;}

input,button {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  background:#0f141b;
  color:white;
}

button {background:#238636;font-weight:700;}

.bill {
  background:#111821;
  padding:10px;
  border-radius:12px;
  margin-top:8px;
}

.bill-top {display:flex;justify-content:space-between;}
.bill-name {font-weight:700;}
.bill-amount {font-weight:900;}

.actions {display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}

.chip {font-size:12px;margin-top:4px;}
.green {color:#2ea043;}
.red {color:#ff6b6b;}
.yellow {color:#f2cc60;}
</style>
</head>

<body>

<div class="wrap">

<div class="title">💳 Finance Command Center</div>
<div class="sub">Your personal money control system</div>

<div class="card">
<input id="income" type="number" placeholder="Monthly Income" oninput="render()">
</div>

<div class="card grid">
<div class="stat">
<div class="stat-title">Total Bills</div>
<div id="total" class="stat-value">$0</div>
</div>

<div class="stat">
<div class="stat-title">Unpaid</div>
<div id="unpaid" class="stat-value">$0</div>
</div>

<div class="stat">
<div class="stat-title">Left Over</div>
<div id="leftover" class="stat-value">$0</div>
</div>

<div class="stat">
<div class="stat-title">Due Soon</div>
<div id="dueSoon" class="stat-value">0</div>
</div>
</div>

<div class="card">
<div>Add Bill</div>
<input id="name" placeholder="Bill Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<button onclick="addBill()">Add</button>
</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script>
let bills = JSON.parse(localStorage.getItem("bills_v41")) || [];

function save(){
localStorage.setItem("bills_v41", JSON.stringify(bills));
}

function daysUntil(date){
return Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
}

function addBill(){
let name = document.getElementById("name").value;
let amount = parseFloat(document.getElementById("amount").value);
let date = document.getElementById("date").value;

if(!name || !amount || !date) return;

bills.push({name,amount,date,paid:false});
save();
render();
}

function toggle(i){
bills[i].paid = !bills[i].paid;
save();
render();
}

function removeBill(i){
bills.splice(i,1);
save();
render();
}

function render(){
let list = document.getElementById("list");

let income = parseFloat(document.getElementById("income").value) || 0;

let total=0, unpaid=0, dueSoon=0;

list.innerHTML="";

bills.forEach((b,i)=>{
total+=b.amount;
if(!b.paid) unpaid+=b.amount;

let days = daysUntil(b.date);
if(!b.paid && days<=3) dueSoon++;

let div = document.createElement("div");
div.className="bill";

div.innerHTML = `
<div class="bill-top">
<div class="bill-name">${b.name}</div>
<div class="bill-amount">$${b.amount}</div>
</div>
<div>${b.date}</div>
<div class="chip ${b.paid?'green':''}">
${b.paid?'Paid':''}
${!b.paid && days<=3?'⚠ Due Soon':''}
</div>
<div class="actions">
<button onclick="toggle(${i})">${b.paid?'Undo':'Pay'}</button>
<button onclick="removeBill(${i})">Delete</button>
</div>
`;

list.appendChild(div);
});

document.getElementById("total").innerText="$"+total.toFixed(2);
document.getElementById("unpaid").innerText="$"+unpaid.toFixed(2);
document.getElementById("dueSoon").innerText=dueSoon;
document.getElementById("leftover").innerText="$"+(income-unpaid).toFixed(2);
}

render();
</script>

</body>
</html>
