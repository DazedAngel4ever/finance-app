<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Command Center V4.5</title>

<style>
body{margin:0;background:#0b0f14;color:#e6edf3;font-family:system-ui;}
.wrap{padding:15px;max-width:760px;margin:auto;}
.title{font-size:26px;font-weight:800;margin-bottom:10px;}
.card{background:#161b22;padding:12px;border-radius:12px;margin-top:10px;}

input,select,button{
width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none;
background:#0f141b;color:white;
}
button{background:#238636;font-weight:700;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat{background:#111821;padding:10px;border-radius:10px;}
.stat-value{font-size:18px;font-weight:800;}

canvas{width:100%;height:200px;margin-top:10px;}

.bill{background:#111821;padding:10px;border-radius:10px;margin-top:8px;}
.bill-top{display:flex;justify-content:space-between;}
.small{font-size:12px;color:#9da7b3;}

</style>
</head>

<body>
<div class="wrap">

<div class="title">💳 Finance Command Center</div>

<div class="card">
<input id="income" placeholder="Monthly Income" type="number" oninput="saveIncome();render()">
</div>

<div class="card grid">
<div class="stat"><div>Total</div><div id="total" class="stat-value">$0</div></div>
<div class="stat"><div>Unpaid</div><div id="unpaid" class="stat-value">$0</div></div>
<div class="stat"><div>Overdue</div><div id="overdue" class="stat-value">0</div></div>
<div class="stat"><div>Leftover</div><div id="leftover" class="stat-value">$0</div></div>
</div>

<div class="card">
<div>📊 Category Bar Chart</div>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<div>🥧 Spending Distribution</div>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<div>📈 Spending Trend</div>
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<div>Add Bill</div>
<input id="name">
<input id="amount" type="number">
<input id="date" type="date">

<select id="category">
<option>Rent</option>
<option>Utilities</option>
<option>Subscriptions</option>
<option>Debt</option>
<option>Other</option>
</select>

<label class="small">
<input type="checkbox" id="recurring"> Recurring
</label>

<button onclick="addBill()">Add</button>
</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script>

let bills=JSON.parse(localStorage.getItem("bills_v45"))||[];

function save(){localStorage.setItem("bills_v45",JSON.stringify(bills));}

function saveIncome(){
localStorage.setItem("income_v45",income.value);
}

function loadIncome(){
income.value=localStorage.getItem("income_v45")||"";
}

function daysUntil(date){
return Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
}

/* ADD */
function addBill(){
let name=nameInput.value;
let amount=parseFloat(amountInput.value);
let date=dateInput.value;
let category=category.value;
let recurring=document.getElementById("recurring").checked;

if(!name||!amount||!date)return;

bills.push({name,amount,date,category,paid:false,recurring});
save();
render();
}

/* TOGGLE */
function toggle(i){bills[i].paid=!bills[i].paid;save();render();}

/* DELETE */
function removeBill(i){bills.splice(i,1);save();render();}

/* BAR CHART */
function drawBar(catTotals){
let c=barChart;
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let max=Math.max(...Object.values(catTotals),1);
let i=0,x=20;

for(let cat in catTotals){
let h=(catTotals[cat]/max)*150;
ctx.fillStyle="#58a6ff";
ctx.fillRect(x,180-h,40,h);
ctx.fillText(cat,x,195);
x+=60;i++;
}
}

/* PIE CHART */
function drawPie(catTotals){
let c=pieChart;
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let total=Object.values(catTotals).reduce((a,b)=>a+b,0);
let start=0;

let colors=["#2ea043","#58a6ff","#f2cc60","#ff6b6b","#8b5cf6"];
let i=0;

for(let cat in catTotals){
let slice=(catTotals[cat]/total)*Math.PI*2;
ctx.beginPath();
ctx.moveTo(100,100);
ctx.arc(100,100,80,start,start+slice);
ctx.fillStyle=colors[i%colors.length];
ctx.fill();
start+=slice;
i++;
}
}

/* TREND */
function drawTrend(){
let c=trendChart;
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let sorted=[...bills].sort((a,b)=>new Date(a.date)-new Date(b.date));

let x=20;
sorted.forEach(b=>{
let y=200-(b.amount/10);
ctx.fillRect(x,y,4,4);
x+=20;
});
}

/* RENDER */
function render(){

let list=document.getElementById("list");
let incomeVal=parseFloat(income.value)||0;

let total=0,unpaid=0,overdue=0;
let catTotals={};

list.innerHTML="";

bills.forEach((b,i)=>{
total+=b.amount;
if(!b.paid)unpaid+=b.amount;

let days=daysUntil(b.date);
if(!b.paid && days<0)overdue++;

catTotals[b.category]=(catTotals[b.category]||0)+b.amount;

let div=document.createElement("div");
div.className="bill";

div.innerHTML=`
<div class="bill-top">
<div>${b.name}</div>
<div>$${b.amount}</div>
</div>
<div class="small">${b.category} | ${b.date}</div>
<button onclick="toggle(${i})">${b.paid?'Undo':'Pay'}</button>
<button onclick="removeBill(${i})">Delete</button>
`;

list.appendChild(div);
});

/* STATS */
totalEl.innerText="$"+total.toFixed(2);
unpaidEl.innerText="$"+unpaid.toFixed(2);
overdueEl.innerText=overdue;
leftoverEl.innerText="$"+(incomeVal-unpaid).toFixed(2);

/* DRAW */
drawBar(catTotals);
drawPie(catTotals);
drawTrend();
}

loadIncome();
render();

</script>
</body>
</html>
