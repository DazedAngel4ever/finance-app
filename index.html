<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Command Center V3</title>
<meta name="theme-color" content="#0b0f14" />
<style>
:root{
  --bg:#0b0f14; --panel:#161b22; --panel2:#111821; --line:#27313d;
  --text:#e6edf3; --muted:#9da7b3;
  --green:#2ea043; --red:#ff6b6b; --yellow:#f2cc60; --blue:#58a6ff; --purple:#8b5cf6;
  --shadow:0 10px 25px rgba(0,0,0,.25); --radius:16px;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b0f14,#0f141b);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif}
.wrap{max-width:1280px;margin:0 auto;padding:16px}
.hero{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.hero h1{margin:0;font-size:28px;font-weight:900}
.sub{color:var(--muted);font-size:13px;margin-top:6px}

.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi .value{font-size:22px;font-weight:900;margin-top:6px}
.kpi.blue{color:var(--blue)} .kpi.green{color:var(--green)} .kpi.red{color:var(--red)} .kpi.yellow{color:var(--yellow)} .kpi.purple{color:#c4b5fd}

.grid{display:grid;grid-template-columns:360px 1fr;gap:12px}
@media(max-width:980px){.grid{grid-template-columns:1fr}}

.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .head{padding:12px 12px 0 12px;font-weight:900}
.card .body{padding:12px}

.row{display:grid;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}

input,select,textarea{
  width:100%;background:#0f141b;color:var(--text);
  border:1px solid var(--line);border-radius:10px;padding:10px 11px;outline:none
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.15)}

.btn{border:none;border-radius:10px;padding:10px 12px;font-weight:900;cursor:pointer}
.btn.blue{background:var(--blue);color:#08111b}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.btn.yellow{background:var(--yellow);color:#1b1b1b}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}

.toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.month{display:flex;align-items:center;gap:8px}
.badge{border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:#0f141b;font-weight:900;min-width:180px;text-align:center}

.alert{border:1px solid var(--red);background:rgba(255,107,107,.12);color:#ffb3b3;border-radius:12px;padding:10px;margin-bottom:10px}

.list{display:grid;gap:10px}
.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.02)}
.item-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.name{font-weight:900}
.meta{color:var(--muted);font-size:12px}
.amount{font-weight:900;font-size:20px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pill{font-size:11px;font-weight:900;border-radius:999px;padding:5px 8px;border:1px solid transparent}
.pill.blue{color:var(--blue);border-color:rgba(88,166,255,.25);background:rgba(88,166,255,.12)}
.pill.green{color:#7ee787;border-color:rgba(46,160,67,.25);background:rgba(46,160,67,.12)}
.pill.red{color:#ffb3b3;border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.12)}
.pill.yellow{color:#f8dd85;border-color:rgba(242,204,96,.25);background:rgba(242,204,96,.12)}
.pill.purple{color:#c4b5fd;border-color:rgba(139,92,246,.25);background:rgba(139,92,246,.12)}
.actions{display:flex;gap:6px;flex-wrap:wrap}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{border:1px solid var(--line);border-radius:10px;min-height:86px;padding:6px;font-size:11px;background:#0f141b}
.day .d{font-weight:900;margin-bottom:4px}
.day.paid{background:rgba(46,160,67,.12)}
.day.overdue{background:rgba(255,107,107,.12)}
.day.upcoming{background:rgba(242,204,96,.12)}
.small{font-size:11px;color:var(--muted)}

.edit-panel{position:fixed;right:0;top:0;height:100%;width:320px;background:#0f141b;border-left:1px solid var(--line);transform:translateX(100%);transition:.2s;padding:12px;z-index:20}
.edit-panel.open{transform:translateX(0)}
</style>
</head>

<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>Finance Command Center</h1>
      <div class="sub">V3 • Monthly Ops • Control Tower</div>
    </div>
    <div class="month">
      <button class="btn ghost" id="prev">◀</button>
      <div class="badge" id="monthLabel"></div>
      <button class="btn ghost" id="next">▶</button>
      <button class="btn ghost" id="today">Today</button>
    </div>
  </div>

  <div id="alerts"></div>

  <div class="kpis">
    <div class="kpi green"><div class="label">Income</div><div class="value" id="kIncome">$0</div></div>
    <div class="kpi blue"><div class="label">Bills</div><div class="value" id="kBills">$0</div></div>
    <div class="kpi purple"><div class="label">Paid</div><div class="value" id="kPaid">$0</div></div>
    <div class="kpi red"><div class="label">Remaining</div><div class="value" id="kRemain">$0</div></div>
    <div class="kpi yellow"><div class="label">Net</div><div class="value" id="kNet">$0</div></div>
  </div>

  <div class="grid">
    <!-- LEFT -->
    <div class="row">
      <div class="card">
        <div class="head">Add Recurring Bill</div>
        <div class="body row">
          <input id="rbName" placeholder="Name"/>
          <div class="row2">
            <input id="rbAmount" type="number" placeholder="Amount"/>
            <input id="rbDay" type="number" min="1" max="31" placeholder="Due day"/>
          </div>
          <select id="rbCat">
            <option>Housing</option><option>Utilities</option><option>Transportation</option>
            <option>Insurance</option><option>Subscriptions</option><option>Debt</option><option>Other</option>
          </select>
          <button class="btn blue" id="addRB">Add Recurring</button>
        </div>
      </div>

      <div class="card">
        <div class="head">Add One-Time Bill</div>
        <div class="body row">
          <input id="otName" placeholder="Name"/>
          <div class="row2">
            <input id="otAmount" type="number" placeholder="Amount"/>
            <input id="otDate" type="date"/>
          </div>
          <select id="otCat">
            <option>Housing</option><option>Utilities</option><option>Transportation</option>
            <option>Insurance</option><option>Subscriptions</option><option>Debt</option><option>Other</option>
          </select>
          <button class="btn blue" id="addOT">Add One-Time</button>
        </div>
      </div>

      <div class="card">
        <div class="head">Income</div>
        <div class="body row">
          <input id="incName" placeholder="Source"/>
          <div class="row2">
            <input id="incAmount" type="number" placeholder="Amount"/>
            <input id="incDate" type="date"/>
          </div>
          <label class="small"><input id="incRecurring" type="checkbox"/> Recurring monthly</label>
          <button class="btn green" id="addInc">Add Income</button>
        </div>
      </div>

      <div class="card">
        <div class="head">Filters</div>
        <div class="body row">
          <input id="search" placeholder="Search..."/>
          <select id="fStatus">
            <option value="all">All</option>
            <option value="paid">Paid</option>
            <option value="unpaid">Unpaid</option>
            <option value="overdue">Overdue</option>
          </select>
          <select id="fCat">
            <option value="all">All Categories</option>
            <option>Housing</option><option>Utilities</option><option>Transportation</option>
            <option>Insurance</option><option>Subscriptions</option><option>Debt</option><option>Other</option>
          </select>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="row">
      <div class="card">
        <div class="head">Calendar</div>
        <div class="body"><div id="calendar" class="calendar"></div></div>
      </div>

      <div class="card">
        <div class="head">Bills</div>
        <div class="body"><div id="list" class="list"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT PANEL -->
<div id="panel" class="edit-panel">
  <h3>Edit Bill</h3>
  <input id="eName"/>
  <input id="eAmount" type="number"/>
  <button class="btn blue" id="saveEdit">Save</button>
</div>

<script>
const KEY="v3_cc";
let state = JSON.parse(localStorage.getItem(KEY)) || {templates:[],instances:[],income:[]};
let current = new Date();
let editId=null;

const $ = id => document.getElementById(id);

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function monthKey(){ return current.toISOString().slice(0,7); }
function fmtMonth(){ return current.toLocaleDateString("en-US",{month:"long",year:"numeric"}); }
function fmtDate(d){ return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function money(n){ return Number(n||0).toLocaleString("en-US",{style:"currency",currency:"USD"}); }

function genMonth(){
  // recurring bills
  state.templates.forEach(t=>{
    const exists = state.instances.some(i=>i.templateId===t.id && i.month===monthKey());
    if(!exists){
      const d = new Date(current.getFullYear(), current.getMonth(), Math.min(31, t.day||1));
      state.instances.push({
        id:crypto.randomUUID(), templateId:t.id, month:monthKey(),
        name:t.name, amount:Number(t.amount), category:t.category||"Other",
        date:d.toISOString().slice(0,10), paid:false, paidDate:null, recurring:true
      });
    }
  });
  // recurring income
  state.income.forEach(i=>{
    if(i.recurring){
      const exists = state.income.some(x=>x.templateId===i.id && x.month===monthKey());
      if(!exists){
        state.income.push({
          id:crypto.randomUUID(), templateId:i.id, month:monthKey(),
          name:i.name, amount:Number(i.amount),
          date:`${monthKey()}-01`, recurring:false
        });
      }
    }
  });
  save();
}

function statusOf(b){
  if(b.paid) return {t:"Paid", c:"green"};
  const today = new Date(new Date().toDateString());
  const due = new Date(b.date+"T00:00:00");
  const diff = Math.ceil((due - today)/86400000);
  if(diff<0) return {t:`Overdue ${Math.abs(diff)}d`, c:"red"};
  if(diff<=7) return {t:`Due in ${diff}d`, c:"yellow"};
  return {t:"Upcoming", c:"blue"};
}

function compute(){
  const bills = state.instances.filter(b=>b.month===monthKey());
  const inc = state.income.filter(i=> (i.month===monthKey()) || (i.date && i.date.startsWith(monthKey())));
  const totalBills = bills.reduce((s,b)=>s+Number(b.amount),0);
  const paid = bills.filter(b=>b.paid).reduce((s,b)=>s+Number(b.amount),0);
  const remain = totalBills - paid;
  const totalIncome = inc.reduce((s,i)=>s+Number(i.amount),0);
  const net = totalIncome - totalBills;

  $("kIncome").textContent = money(totalIncome);
  $("kBills").textContent = money(totalBills);
  $("kPaid").textContent = money(paid);
  $("kRemain").textContent = money(remain);
  $("kNet").textContent = money(net);

  // alerts
  const overdue = bills.filter(b=>!b.paid && new Date(b.date)<new Date(new Date().toDateString()));
  let alerts="";
  if(overdue.length) alerts += `<div class="alert">⚠ ${overdue.length} overdue bill(s)</div>`;
  if(net<0) alerts += `<div class="alert">⚠ Net negative this month</div>`;
  $("alerts").innerHTML = alerts;

  return {bills, inc};
}

function renderCalendar(bills){
  const el = $("calendar"); el.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  const days = new Date(y, m+1, 0).getDate();

  for(let d=1; d<=days; d++){
    const date = `${monthKey()}-${String(d).padStart(2,"0")}`;
    const dayBills = bills.filter(b=>b.date===date);
    let cls="day";
    if(dayBills.some(b=>!b.paid && new Date(b.date)<new Date(new Date().toDateString()))) cls+=" overdue";
    else if(dayBills.some(b=>b.paid)) cls+=" paid";
    else if(dayBills.length) cls+=" upcoming";

    el.innerHTML += `
      <div class="${cls}">
        <div class="d">${d}</div>
        ${dayBills.map(b=>`<div>$${Number(b.amount)}</div>`).join("")}
      </div>`;
  }
}

function renderList(bills){
  const q = $("search").value.toLowerCase();
  const s = $("fStatus").value;
  const c = $("fCat").value;

  let items = bills.filter(b=>{
    const matchQ = `${b.name} ${b.category}`.toLowerCase().includes(q);
    const st = statusOf(b);
    const matchS = s==="all" || (s==="paid" && b.paid) || (s==="unpaid" && !b.paid) || (s==="overdue" && st.c==="red");
    const matchC = c==="all" || b.category===c;
    return matchQ && matchS && matchC;
  }).sort((a,b)=> new Date(a.date)-new Date(b.date));

  $("list").innerHTML = items.map(b=>{
    const st = statusOf(b);
    return `
      <div class="item">
        <div class="item-top">
          <div>
            <div class="name">${b.name}</div>
            <div class="meta">Due: ${fmtDate(b.date)} • ${b.category}</div>
          </div>
          <div class="amount">${money(b.amount)}</div>
        </div>
        <div class="pills">
          <span class="pill ${st.c}">${st.t}</span>
          ${b.recurring?`<span class="pill purple">Recurring</span>`:""}
        </div>
        <div class="actions">
          <button class="btn ${b.paid?'yellow':'green'}" onclick="togglePaid('${b.id}')">${b.paid?'Unpay':'Pay'}</button>
          <button class="btn blue" onclick="openEdit('${b.id}')">Edit</button>
          <button class="btn red" onclick="delInst('${b.id}')">Delete</button>
        </div>
      </div>`;
  }).join("");
}

function render(){
  $("monthLabel").textContent = fmtMonth();
  genMonth();
  const {bills} = compute();
  renderCalendar(bills);
  renderList(bills);
}

// actions
$("addRB").onclick = ()=>{
  const name=$("rbName").value.trim();
  const amount=Number($("rbAmount").value);
  const day=Number($("rbDay").value);
  const category=$("rbCat").value;
  if(!name||!amount||!day){alert("Fill name/amount/day");return;}
  state.templates.push({id:crypto.randomUUID(),name,amount,day,category});
  save(); render();
};

$("addOT").onclick = ()=>{
  const name=$("otName").value.trim();
  const amount=Number($("otAmount").value);
  const date=$("otDate").value;
  const category=$("otCat").value;
  if(!name||!amount||!date){alert("Fill name/amount/date");return;}
  state.instances.push({
    id:crypto.randomUUID(), templateId:null, month:date.slice(0,7),
    name, amount, category, date, paid:false, paidDate:null, recurring:false
  });
  save(); render();
};

$("addInc").onclick = ()=>{
  const name=$("incName").value.trim();
  const amount=Number($("incAmount").value);
  const date=$("incDate").value;
  const recurring=$("incRecurring").checked;
  if(!name||!amount||( !date && !recurring )){alert("Fill source/amount/date (or set recurring)");return;}
  state.income.push({id:crypto.randomUUID(),name,amount,date,recurring});
  save(); render();
};

window.togglePaid = (id)=>{
  state.instances = state.instances.map(b=>{
    if(b.id!==id) return b;
    const next = !b.paid;
    return {...b, paid:next, paidDate: next ? new Date().toISOString().slice(0,10) : null};
  });
  save(); render();
};

window.delInst = (id)=>{
  if(!confirm("Delete this bill?")) return;
  state.instances = state.instances.filter(b=>b.id!==id);
  save(); render();
};

// edit panel
window.openEdit = (id)=>{
  const b = state.instances.find(x=>x.id===id);
  if(!b) return;
  editId=id;
  $("eName").value=b.name;
  $("eAmount").value=b.amount;
  $("panel").classList.add("open");
};

$("saveEdit").onclick = ()=>{
  if(!editId) return;
  state.instances = state.instances.map(b=> b.id===editId ? {...b, name:$("eName").value, amount:Number($("eAmount").value)} : b);
  save(); $("panel").classList.remove("open"); editId=null; render();
};

// filters & nav
$("search").oninput = render;
$("fStatus").onchange = render;
$("fCat").onchange = render;

$("prev").onclick = ()=>{ current.setMonth(current.getMonth()-1); render(); };
$("next").onclick = ()=>{ current.setMonth(current.getMonth()+1); render(); };
$("today").onclick = ()=>{ current=new Date(); render(); };

render();
</script>
</body>
</html>
