<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Command Center V4.7</title>
  <meta name="theme-color" content="#0b0f14" />
  <style>
    body{
      margin:0;
      background:#0b0f14;
      color:#e6edf3;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
    }
    .wrap{
      padding:15px;
      max-width:760px;
      margin:auto;
    }
    .title{
      font-size:26px;
      font-weight:800;
      margin-bottom:10px;
    }
    .card{
      background:#161b22;
      padding:12px;
      border-radius:12px;
      margin-top:10px;
      border:1px solid #27313d;
    }
    .section-title{
      font-size:16px;
      font-weight:700;
      margin-bottom:8px;
    }
    input,select,button{
      width:100%;
      padding:10px;
      margin-top:6px;
      border-radius:10px;
      border:none;
      background:#0f141b;
      color:white;
      box-sizing:border-box;
      font:inherit;
    }
    button{
      background:#238636;
      font-weight:700;
    }
    button.secondary{
      background:#1a2230;
      border:1px solid #27313d;
    }
    button.danger{
      background:#4b1f24;
      color:#ffd0d0;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
    .stat{
      background:#111821;
      padding:10px;
      border-radius:10px;
    }
    .stat-label{
      font-size:12px;
      color:#9da7b3;
      margin-bottom:4px;
    }
    .stat-value{
      font-size:18px;
      font-weight:800;
    }
    .alert-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .alert-box{
      background:#111821;
      padding:10px;
      border-radius:10px;
      border-left:4px solid #58a6ff;
    }
    .alert-box.red{ border-left-color:#ff6b6b; }
    .alert-box.yellow{ border-left-color:#f2cc60; }
    .alert-box.green{ border-left-color:#2ea043; }
    .alert-box.blue{ border-left-color:#58a6ff; }
    .alert-label{
      font-size:12px;
      color:#9da7b3;
      margin-bottom:4px;
    }
    .alert-value{
      font-size:17px;
      font-weight:800;
    }
    .month-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:end;
    }
    .bill{
      background:#111821;
      padding:10px;
      border-radius:10px;
      margin-top:8px;
      border-left:4px solid #2ea043;
    }
    .bill.overdue{ border-left-color:#ff6b6b; }
    .bill.soon{ border-left-color:#f2cc60; }
    .bill-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .small{
      font-size:12px;
      color:#9da7b3;
      margin-top:4px;
    }
    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .chip{
      font-size:12px;
      padding:5px 8px;
      border-radius:999px;
      background:#1b2430;
      border:1px solid #27313d;
      color:#cdd6df;
    }
    .chip.red{ color:#ffd0d0; background:#351920; border-color:#5a2c34; }
    .chip.yellow{ color:#ffe6a0; background:#342a10; border-color:#6d5a21; }
    .chip.green{ color:#c8ffd8; background:#13261a; border-color:#2f6c3d; }
    .chip.blue{ color:#d6e8ff; background:#122031; border-color:#2d557d; }
    .bill-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .canvas-wrap{
      width:100%;
      overflow:hidden;
    }
    canvas{
      width:100%;
      height:220px;
      display:block;
      background:#0f141b;
      border-radius:10px;
      margin-top:8px;
    }
    .empty{
      color:#9da7b3;
      font-size:13px;
      padding:8px 0;
    }
    .budget-row{
      display:grid;
      grid-template-columns:1.2fr .8fr auto;
      gap:8px;
      align-items:end;
      margin-top:8px;
    }
    .budget-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }
    .budget-item{
      background:#111821;
      border:1px solid #27313d;
      border-radius:10px;
      padding:10px;
    }
    .budget-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:8px;
    }
    .budget-name{
      font-weight:700;
    }
    .budget-status{
      font-size:12px;
      font-weight:700;
    }
    .budget-status.good{ color:#2ea043; }
    .budget-status.warn{ color:#f2cc60; }
    .budget-status.bad{ color:#ff6b6b; }
    .budget-meta{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      font-size:12px;
      color:#9da7b3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">💳 Finance Command Center</div>

    <div class="card">
      <div class="section-title">Month View</div>
      <div class="month-row">
        <select id="monthFilter"></select>
        <button class="secondary" id="goCurrentMonthBtn">Go to Current Month</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Monthly Income</div>
      <input id="income" placeholder="Monthly Income" type="number" step="0.01">
    </div>

    <div class="card">
      <div class="section-title">Alerts Panel</div>
      <div class="alert-grid">
        <div class="alert-box red">
          <div class="alert-label">Overdue Bills</div>
          <div id="alertOverdue" class="alert-value">0</div>
        </div>
        <div class="alert-box red">
          <div class="alert-label">Due Today</div>
          <div id="alertToday" class="alert-value">0</div>
        </div>
        <div class="alert-box yellow">
          <div class="alert-label">Due Soon (3 days)</div>
          <div id="alertSoon" class="alert-value">0</div>
        </div>
        <div class="alert-box blue">
          <div class="alert-label">Highest Unpaid</div>
          <div id="alertHighest" class="alert-value">$0.00</div>
        </div>
      </div>
    </div>

    <div class="card grid">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div id="total" class="stat-value">$0.00</div>
      </div>
      <div class="stat">
        <div class="stat-label">Unpaid</div>
        <div id="unpaid" class="stat-value">$0.00</div>
      </div>
      <div class="stat">
        <div class="stat-label">Overdue</div>
        <div id="overdue" class="stat-value">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Leftover</div>
        <div id="leftover" class="stat-value">$0.00</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Budget Tracking</div>
      <div class="budget-row">
        <select id="budgetCategory">
          <option>Rent</option>
          <option>Utilities</option>
          <option>Subscriptions</option>
          <option>Debt</option>
          <option>Other</option>
        </select>
        <input id="budgetAmount" type="number" step="0.01" placeholder="Planned Budget">
        <button id="saveBudgetBtn">Save</button>
      </div>
      <div id="budgetList" class="budget-list"></div>
    </div>

    <div class="card">
      <div class="section-title">📊 Category Bar Chart</div>
      <div class="canvas-wrap"><canvas id="barChart"></canvas></div>
    </div>

    <div class="card">
      <div class="section-title">🥧 Spending Distribution</div>
      <div class="canvas-wrap"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="card">
      <div class="section-title">📈 Spending Trend</div>
      <div class="canvas-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="card">
      <div class="section-title" id="formTitle">Add Bill</div>
      <input id="name" placeholder="Bill Name">
      <input id="amount" type="number" step="0.01" placeholder="Amount">
      <input id="date" type="date">

      <select id="category">
        <option>Rent</option>
        <option>Utilities</option>
        <option>Subscriptions</option>
        <option>Debt</option>
        <option>Other</option>
      </select>

      <label class="small">
        <input type="checkbox" id="recurring" style="width:auto;margin-right:8px;"> Recurring
      </label>

      <div class="grid-3">
        <button id="saveBillBtn">Add</button>
        <button class="secondary" id="cancelEditBtn">Cancel</button>
        <button class="secondary" id="duplicateBillBtn">Duplicate Last</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Bills</div>
      <div id="list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "bills_v47";
    const BUDGET_KEY = "budgets_v47";
    const INCOME_KEY = "income_v47";
    const MONTH_KEY = "month_filter_v47";
    const LEGACY_KEYS = ["bills_v46", "bills_v45_fixed", "bills_v45", "finance_exec_v1", "bills_v44", "finance_v4_lite_data", "bills_v43", "bills_v42", "bills_v41"];
    const LEGACY_BUDGET_KEYS = ["budgets_v46"];
    const LEGACY_INCOME_KEYS = ["income_v46", "income_v45_fixed", "income_v45", "finance_exec_income", "income_v44"];

    let bills = [];
    let budgets = {};
    let editingId = null;

    const incomeEl = document.getElementById("income");
    const monthFilterEl = document.getElementById("monthFilter");
    const totalEl = document.getElementById("total");
    const unpaidEl = document.getElementById("unpaid");
    const overdueEl = document.getElementById("overdue");
    const leftoverEl = document.getElementById("leftover");
    const listEl = document.getElementById("list");
    const formTitleEl = document.getElementById("formTitle");

    const nameEl = document.getElementById("name");
    const amountEl = document.getElementById("amount");
    const dateEl = document.getElementById("date");
    const categoryEl = document.getElementById("category");
    const recurringEl = document.getElementById("recurring");

    const saveBillBtn = document.getElementById("saveBillBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const duplicateBillBtn = document.getElementById("duplicateBillBtn");
    const goCurrentMonthBtn = document.getElementById("goCurrentMonthBtn");

    const budgetCategoryEl = document.getElementById("budgetCategory");
    const budgetAmountEl = document.getElementById("budgetAmount");
    const saveBudgetBtn = document.getElementById("saveBudgetBtn");
    const budgetListEl = document.getElementById("budgetList");

    function money(v){
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(v || 0));
    }

    function uid(){
      return "bill_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function todayString(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function currentMonthKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function toLocalDate(dateStr){
      const parts = String(dateStr || "").split("-");
      if (parts.length !== 3) return null;
      return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]), 12, 0, 0);
    }

    function monthKeyFromDate(dateStr){
      const d = toLocalDate(dateStr);
      if (!d) return "";
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function formatMonthLabel(monthKey){
      const [y, m] = monthKey.split("-").map(Number);
      const d = new Date(y, m - 1, 1);
      return d.toLocaleString("en-US", { month: "long", year: "numeric" });
    }

    function daysUntil(dateStr){
      const due = toLocalDate(dateStr);
      const now = toLocalDate(todayString());
      if (!due || !now) return 9999;
      return Math.round((due - now) / 86400000);
    }

    function saveBills(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bills));
    }

    function loadBills(){
      let loaded = [];
      for (const key of LEGACY_KEYS){
        try{
          const raw = localStorage.getItem(key);
          if (raw){
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)){
              loaded = parsed;
              break;
            }
          }
        } catch(e){}
      }

      bills = loaded.map(b => ({
        id: b.id || uid(),
        name: b.name || "",
        amount: Number(b.amount || 0),
        date: b.date || "",
        category: b.category || "Other",
        paid: !!b.paid,
        recurring: !!b.recurring
      }));

      saveBills();
    }

    function saveBudgets(){
      localStorage.setItem(BUDGET_KEY, JSON.stringify(budgets));
    }

    function loadBudgets(){
      try{
        budgets = JSON.parse(localStorage.getItem(BUDGET_KEY)) || {};
      } catch(e){
        budgets = {};
      }
      if (!Object.keys(budgets).length) {
        for (const key of LEGACY_BUDGET_KEYS){
          try{
            const raw = localStorage.getItem(key);
            if (raw){
              const parsed = JSON.parse(raw);
              if (parsed && typeof parsed === "object"){
                budgets = parsed;
                break;
              }
            }
          } catch(e){}
        }
      }
    }

    function saveIncome(){
      localStorage.setItem(INCOME_KEY, incomeEl.value || "");
    }

    function loadIncome(){
      for (const key of LEGACY_INCOME_KEYS){
        const val = localStorage.getItem(key);
        if (val !== null && val !== ""){
          incomeEl.value = val;
          localStorage.setItem(INCOME_KEY, val);
          return;
        }
      }
      incomeEl.value = localStorage.getItem(INCOME_KEY) || "";
    }

    function saveMonthFilter(){
      localStorage.setItem(MONTH_KEY, monthFilterEl.value || currentMonthKey());
    }

    function generateRecurring(){
      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();
      let changed = false;

      const snapshot = [...bills];
      snapshot.forEach(b => {
        if (!b.recurring) return;

        const original = toLocalDate(b.date);
        if (!original) return;

        const lastDay = new Date(year, month + 1, 0).getDate();
        const targetDay = Math.min(original.getDate(), lastDay);
        const target = new Date(year, month, targetDay, 12, 0, 0);
        const targetStr = `${target.getFullYear()}-${String(target.getMonth() + 1).padStart(2, "0")}-${String(target.getDate()).padStart(2, "0")}`;

        const exists = bills.some(x =>
          x.name === b.name &&
          x.amount === b.amount &&
          x.category === b.category &&
          x.date === targetStr
        );

        if (!exists && (original.getMonth() !== month || original.getFullYear() !== year)){
          bills.push({
            id: uid(),
            name: b.name,
            amount: b.amount,
            date: targetStr,
            category: b.category,
            paid: false,
            recurring: false
          });
          changed = true;
        }
      });

      if (changed) saveBills();
    }

    function billStatus(b){
      if (b.paid) return "paid";
      const days = daysUntil(b.date);
      if (days < 0) return "overdue";
      if (days <= 3) return "soon";
      return "normal";
    }

    function sortBills(list){
      return [...list].sort((a, b) => {
        const pa = billStatus(a) === "overdue" ? 1 : billStatus(a) === "soon" ? 2 : billStatus(a) === "normal" ? 3 : 4;
        const pb = billStatus(b) === "overdue" ? 1 : billStatus(b) === "soon" ? 2 : billStatus(b) === "normal" ? 3 : 4;
        if (pa !== pb) return pa - pb;
        return daysUntil(a.date) - daysUntil(b.date);
      });
    }

    function filteredBills(){
      const selectedMonth = monthFilterEl.value || currentMonthKey();
      return bills.filter(b => monthKeyFromDate(b.date) === selectedMonth);
    }

    function populateMonthFilter(){
      const months = [...new Set(bills.map(b => monthKeyFromDate(b.date)).filter(Boolean))];
      const current = currentMonthKey();
      if (!months.includes(current)) months.push(current);
      months.sort();

      const saved = localStorage.getItem(MONTH_KEY) || current;
      monthFilterEl.innerHTML = months.map(m => `<option value="${m}">${formatMonthLabel(m)}</option>`).join("");
      monthFilterEl.value = months.includes(saved) ? saved : current;
    }

    function resetForm(){
      editingId = null;
      formTitleEl.textContent = "Add Bill";
      saveBillBtn.textContent = "Add";
      nameEl.value = "";
      amountEl.value = "";
      dateEl.value = "";
      categoryEl.value = "Rent";
      recurringEl.checked = false;
    }

    function saveBill(){
      const name = nameEl.value.trim();
      const amount = Number(amountEl.value);
      const date = dateEl.value;
      const category = categoryEl.value;
      const recurring = recurringEl.checked;

      if (!name || !amount || amount <= 0 || !date){
        alert("Enter a bill name, amount, and due date.");
        return;
      }

      if (editingId){
        const bill = bills.find(b => b.id === editingId);
        if (!bill) return;
        bill.name = name;
        bill.amount = amount;
        bill.date = date;
        bill.category = category;
        bill.recurring = recurring;
      } else {
        bills.push({
          id: uid(),
          name,
          amount,
          date,
          category,
          paid: false,
          recurring
        });
      }

      saveBills();
      populateMonthFilter();
      if (!editingId) {
        monthFilterEl.value = monthKeyFromDate(date) || currentMonthKey();
        saveMonthFilter();
      }
      resetForm();
      render();
    }

    function editBill(id){
      const bill = bills.find(b => b.id === id);
      if (!bill) return;

      editingId = id;
      formTitleEl.textContent = "Edit Bill";
      saveBillBtn.textContent = "Update";
      nameEl.value = bill.name;
      amountEl.value = bill.amount;
      dateEl.value = bill.date;
      categoryEl.value = bill.category;
      recurringEl.checked = !!bill.recurring;
      window.scrollTo({ top: document.body.scrollHeight * 0.35, behavior: "smooth" });
    }

    function duplicateLastBill(){
      const list = filteredBills();
      if (!list.length){
        alert("No bill in this month to duplicate.");
        return;
      }
      const bill = sortBills(list)[list.length - 1];
      nameEl.value = bill.name;
      amountEl.value = bill.amount;
      dateEl.value = bill.date;
      categoryEl.value = bill.category;
      recurringEl.checked = !!bill.recurring;
      editingId = null;
      formTitleEl.textContent = "Duplicate Bill";
      saveBillBtn.textContent = "Add";
    }

    function saveBudget(){
      const category = budgetCategoryEl.value;
      const amount = Number(budgetAmountEl.value);

      if (!category || !amount || amount <= 0){
        alert("Enter a valid planned budget.");
        return;
      }

      budgets[category] = amount;
      saveBudgets();
      budgetAmountEl.value = "";
      render();
    }

    function deleteBudget(category){
      delete budgets[category];
      saveBudgets();
      render();
    }

    function togglePaid(id){
      const bill = bills.find(b => b.id === id);
      if (!bill) return;
      bill.paid = !bill.paid;
      saveBills();
      render();
    }

    function removeBill(id){
      bills = bills.filter(b => b.id !== id);
      saveBills();
      if (editingId === id) resetForm();
      populateMonthFilter();
      render();
    }

    function setupCanvas(canvas){
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(300, Math.floor(rect.width * ratio));
      canvas.height = Math.floor(220 * ratio);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return ctx;
    }

    function drawBar(catTotals){
      const canvas = document.getElementById("barChart");
      const ctx = setupCanvas(canvas);
      const width = canvas.width / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, width, 220);

      const entries = Object.entries(catTotals);
      if (!entries.length){
        ctx.fillStyle = "#9da7b3";
        ctx.font = "14px system-ui";
        ctx.fillText("No category data for this month", 16, 30);
        return;
      }

      const max = Math.max(...entries.map(([,v]) => v), 1);
      const chartBottom = 180;
      const chartHeight = 160;
      const barWidth = Math.min(44, (width - 30) / entries.length - 16);
      const gap = 16;
      const colors = ["#58a6ff", "#2ea043", "#f2cc60", "#ff6b6b", "#8b5cf6"];

      entries.forEach(([cat, val], i) => {
        const x = 20 + i * (barWidth + gap);
        const h = (val / max) * chartHeight;
        const y = chartBottom - h;
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(x, y, barWidth, h);
        ctx.fillStyle = "#e6edf3";
        ctx.font = "11px system-ui";
        ctx.fillText(cat.slice(0, 10), x, 198);
      });
    }

    function drawPie(catTotals){
      const canvas = document.getElementById("pieChart");
      const ctx = setupCanvas(canvas);
      const width = canvas.width / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, width, 220);

      const entries = Object.entries(catTotals);
      if (!entries.length){
        ctx.fillStyle = "#9da7b3";
        ctx.font = "14px system-ui";
        ctx.fillText("No category data for this month", 16, 30);
        return;
      }

      const total = entries.reduce((sum, [,v]) => sum + v, 0);
      const cx = 110, cy = 110, r = 72;
      const colors = ["#2ea043", "#58a6ff", "#f2cc60", "#ff6b6b", "#8b5cf6", "#14b8a6"];
      let start = -Math.PI / 2;

      entries.forEach(([cat, val], i) => {
        const slice = (val / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        start += slice;
      });

      ctx.beginPath();
      ctx.fillStyle = "#0f141b";
      ctx.arc(cx, cy, 38, 0, Math.PI * 2);
      ctx.fill();

      entries.slice(0, 4).forEach(([cat, val], i) => {
        const lx = 220;
        const ly = 38 + i * 32;
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(lx, ly, 12, 12);
        ctx.fillStyle = "#e6edf3";
        ctx.font = "12px system-ui";
        ctx.fillText(cat, lx + 18, ly + 10);
        ctx.fillStyle = "#9da7b3";
        ctx.fillText(Math.round((val / total) * 100) + "%", lx + 90, ly + 10);
      });
    }

    function drawTrend(list){
      const canvas = document.getElementById("trendChart");
      const ctx = setupCanvas(canvas);
      const width = canvas.width / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, width, 220);

      const sorted = [...list].sort((a,b) => new Date(a.date) - new Date(b.date));
      if (!sorted.length){
        ctx.fillStyle = "#9da7b3";
        ctx.font = "14px system-ui";
        ctx.fillText("No trend data for this month", 16, 30);
        return;
      }

      const amounts = sorted.map(b => Number(b.amount || 0));
      const max = Math.max(...amounts, 1);
      const left = 20, right = width - 20, top = 20, bottom = 180;
      const spanX = Math.max(1, right - left), spanY = bottom - top;

      ctx.strokeStyle = "#27313d";
      ctx.beginPath();
      ctx.moveTo(left, bottom);
      ctx.lineTo(right, bottom);
      ctx.stroke();

      ctx.strokeStyle = "#58a6ff";
      ctx.lineWidth = 2;
      ctx.beginPath();

      sorted.forEach((b, i) => {
        const x = sorted.length === 1 ? left : left + (i / (sorted.length - 1)) * spanX;
        const y = bottom - (b.amount / max) * spanY;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.stroke();

      sorted.forEach((b, i) => {
        const x = sorted.length === 1 ? left : left + (i / (sorted.length - 1)) * spanX;
        const y = bottom - (b.amount / max) * spanY;
        ctx.fillStyle = "#2ea043";
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function renderAlerts(list){
      const unpaidBills = list.filter(b => !b.paid);
      const overdueBills = unpaidBills.filter(b => daysUntil(b.date) < 0);
      const todayBills = unpaidBills.filter(b => daysUntil(b.date) === 0);
      const soonBills = unpaidBills.filter(b => {
        const d = daysUntil(b.date);
        return d > 0 && d <= 3;
      });
      const highest = unpaidBills.reduce((max, b) => b.amount > max.amount ? b : max, { amount: 0 });

      document.getElementById("alertOverdue").textContent = overdueBills.length;
      document.getElementById("alertToday").textContent = todayBills.length;
      document.getElementById("alertSoon").textContent = soonBills.length;
      document.getElementById("alertHighest").textContent = money(highest.amount || 0);
    }

    function renderBudget(list){
      const categories = ["Rent", "Utilities", "Subscriptions", "Debt", "Other"];
      const actuals = {};
      list.forEach(b => {
        actuals[b.category] = (actuals[b.category] || 0) + Number(b.amount || 0);
      });

      const rows = categories
        .filter(cat => budgets[cat] || actuals[cat])
        .map(cat => {
          const planned = Number(budgets[cat] || 0);
          const actual = Number(actuals[cat] || 0);
          const diff = planned - actual;

          let statusText = "No budget";
          let statusClass = "";
          if (planned > 0) {
            if (actual > planned) {
              statusText = "Over budget";
              statusClass = "bad";
            } else if (actual >= planned * 0.85) {
              statusText = "Close";
              statusClass = "warn";
            } else {
              statusText = "Under budget";
              statusClass = "good";
            }
          }

          return `
            <div class="budget-item">
              <div class="budget-top">
                <div class="budget-name">${escapeHtml(cat)}</div>
                <div class="budget-status ${statusClass}">${statusText}</div>
              </div>
              <div class="budget-meta">
                <div>Planned: ${money(planned)}</div>
                <div>Actual: ${money(actual)}</div>
                <div>${planned > 0 ? (diff >= 0 ? "Left: " + money(diff) : "Over: " + money(Math.abs(diff))) : "Set budget"}</div>
              </div>
              <button class="danger" style="margin-top:8px;" onclick="deleteBudget('${cat}')">Delete Budget</button>
            </div>
          `;
        });

      budgetListEl.innerHTML = rows.length ? rows.join("") : '<div class="empty">No budgets set for this month view.</div>';
    }

    function renderList(list){
      if (!list.length){
        listEl.innerHTML = '<div class="empty">No bills in this month.</div>';
        return;
      }

      listEl.innerHTML = sortBills(list).map(b => {
        const status = billStatus(b);
        const days = daysUntil(b.date);
        const cls = status === "overdue" ? "overdue" : status === "soon" ? "soon" : "";

        let chip = '<span class="chip green">Paid</span>';
        if (!b.paid && status === "overdue") chip = `<span class="chip red">${Math.abs(days)} day${Math.abs(days) === 1 ? "" : "s"} overdue</span>`;
        else if (!b.paid && status === "soon") chip = days === 0
          ? '<span class="chip red">Due today</span>'
          : `<span class="chip yellow">Due in ${days} day${days === 1 ? "" : "s"}</span>`;
        else if (!b.paid) chip = '<span class="chip green">Upcoming</span>';

        return `
          <div class="bill ${cls}">
            <div class="bill-top">
              <div>
                <div><strong>${escapeHtml(b.name)}</strong></div>
                <div class="small">${escapeHtml(b.category)} | ${escapeHtml(b.date)}</div>
              </div>
              <div><strong>${money(b.amount)}</strong></div>
            </div>
            <div class="chip-row">
              ${chip}
              ${b.recurring ? '<span class="chip">Recurring</span>' : ''}
            </div>
            <div class="bill-actions">
              <button onclick="togglePaid('${b.id}')">${b.paid ? 'Undo' : 'Pay'}</button>
              <button class="secondary" onclick="editBill('${b.id}')">Edit</button>
              <button class="danger" onclick="removeBill('${b.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function render(){
      saveIncome();
      saveMonthFilter();
      generateRecurring();
      populateMonthFilter();

      const list = filteredBills();
      const incomeVal = Number(incomeEl.value || 0);
      const total = list.reduce((sum, b) => sum + Number(b.amount || 0), 0);
      const unpaid = list.filter(b => !b.paid).reduce((sum, b) => sum + Number(b.amount || 0), 0);
      const overdue = list.filter(b => !b.paid && daysUntil(b.date) < 0).length;
      const leftover = incomeVal - unpaid;

      totalEl.textContent = money(total);
      unpaidEl.textContent = money(unpaid);
      overdueEl.textContent = String(overdue);
      leftoverEl.textContent = money(leftover);

      const catTotals = {};
      list.forEach(b => {
        catTotals[b.category] = (catTotals[b.category] || 0) + Number(b.amount || 0);
      });

      renderAlerts(list);
      renderBudget(list);
      drawBar(catTotals);
      drawPie(catTotals);
      drawTrend(list);
      renderList(list);
    }

    saveBillBtn.addEventListener("click", saveBill);
    saveBudgetBtn.addEventListener("click", saveBudget);
    duplicateBillBtn.addEventListener("click", duplicateLastBill);
    cancelEditBtn.addEventListener("click", resetForm);
    incomeEl.addEventListener("input", render);
    monthFilterEl.addEventListener("change", render);
    goCurrentMonthBtn.addEventListener("click", () => {
      monthFilterEl.value = currentMonthKey();
      saveMonthFilter();
      render();
    });
    window.addEventListener("resize", render);

    loadBills();
    loadBudgets();
    loadIncome();
    populateMonthFilter();
    resetForm();
    render();
  </script>
</body>
</html>
