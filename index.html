<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Command Center</title>
  <meta name="theme-color" content="#0b0f14" />
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#161b22;
      --panel2:#111821;
      --line:#27313d;
      --text:#e6edf3;
      --muted:#9da7b3;
      --green:#2ea043;
      --red:#ff6b6b;
      --yellow:#f2cc60;
      --blue:#58a6ff;
      --purple:#8b5cf6;
      --teal:#14b8a6;
      --shadow: 0 10px 25px rgba(0,0,0,.25);
      --radius: 18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:linear-gradient(180deg,#0b0f14 0%, #0f141b 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:16px;
    }

    .hero{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .hero-title{
      margin:0;
      font-size:30px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:.2px;
    }

    .hero-sub{
      color:var(--muted);
      margin-top:8px;
      font-size:14px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .grid{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:16px;
    }

    @media (max-width: 980px){
      .grid{
        grid-template-columns: 1fr;
      }
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .card-head{
      padding:16px 16px 0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .card-title{
      margin:0;
      font-size:16px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .card-body{
      padding:16px;
    }

    .stats{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:12px;
      margin-bottom:16px;
    }

    @media (max-width: 900px){
      .stats{
        grid-template-columns: repeat(2,1fr);
      }
    }

    @media (max-width: 520px){
      .stats{
        grid-template-columns: 1fr;
      }
    }

    .stat{
      padding:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.02);
    }

    .stat .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.7px;
    }

    .stat .value{
      font-size:24px;
      font-weight:800;
    }

    .accent-blue{color:var(--blue)}
    .accent-green{color:var(--green)}
    .accent-red{color:var(--red)}
    .accent-yellow{color:var(--yellow)}

    form{
      display:grid;
      gap:12px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.3px;
      text-transform:uppercase;
    }

    input, select, textarea{
      width:100%;
      background:#0f141b;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 13px;
      outline:none;
      font:inherit;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(88,166,255,.15);
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width: 560px){
      .row-2{
        grid-template-columns:1fr;
      }
    }

    .row-3{
      display:grid;
      grid-template-columns:1.15fr .85fr .85fr;
      gap:12px;
    }

    @media (max-width: 760px){
      .row-3{
        grid-template-columns:1fr;
      }
    }

    .checkbox-row{
      display:flex;
      align-items:center;
      gap:10px;
      padding:4px 2px;
    }

    .checkbox-row input{
      width:auto;
      margin:0;
      transform:scale(1.15);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:11px 14px;
      cursor:pointer;
      font-weight:800;
      color:white;
      background:#253041;
      transition:.18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.06);
    }

    .btn-primary{background:var(--blue); color:#08111b;}
    .btn-success{background:var(--green);}
    .btn-danger{background:var(--red);}
    .btn-ghost{
      background:transparent;
      border:1px solid var(--line);
      color:var(--text);
    }
    .btn-warning{background:var(--yellow); color:#1b1b1b;}
    .btn-purple{background:var(--purple);}
    .btn-teal{background:var(--teal); color:#06201d;}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .toolbar > *{
      flex:1 1 180px;
    }

    .progress-shell{
      width:100%;
      height:12px;
      background:#0f141b;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--green),var(--teal));
      transition:width .25s ease;
    }

    .progress-label{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .bill-list{
      display:grid;
      gap:12px;
    }

    .bill{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.02);
      padding:14px;
    }

    .bill-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .bill-name{
      font-size:18px;
      font-weight:800;
      margin:0 0 4px 0;
    }

    .bill-meta{
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .amount{
      font-size:22px;
      font-weight:800;
      white-space:nowrap;
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:8px 0 12px 0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid transparent;
    }

    .pill.blue{background:rgba(88,166,255,.12); color:var(--blue); border-color:rgba(88,166,255,.25);}
    .pill.green{background:rgba(46,160,67,.12); color:#7ee787; border-color:rgba(46,160,67,.25);}
    .pill.red{background:rgba(255,107,107,.12); color:#ffb3b3; border-color:rgba(255,107,107,.25);}
    .pill.yellow{background:rgba(242,204,96,.12); color:#f8dd85; border-color:rgba(242,204,96,.25);}
    .pill.purple{background:rgba(139,92,246,.12); color:#c4b5fd; border-color:rgba(139,92,246,.25);}

    .bill-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:10px;
      padding:9px 10px;
      cursor:pointer;
      font-weight:800;
      color:white;
      background:#253041;
    }

    .mini-btn.pay{background:var(--green)}
    .mini-btn.unpay{background:var(--yellow); color:#1b1b1b;}
    .mini-btn.edit{background:var(--blue); color:#08111b;}
    .mini-btn.delete{background:var(--red)}

    .empty{
      color:var(--muted);
      text-align:center;
      padding:26px 18px;
      border:1px dashed var(--line);
      border-radius:16px;
    }

    .footer-note{
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1 class="hero-title">Finance Command Center</h1>
        <div class="hero-sub">Bill Tracker • Monthly Overview • Local Save</div>
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" id="exportBtn">Export Data</button>
        <label class="btn btn-ghost" for="importFile" style="display:inline-flex;align-items:center;justify-content:center;">
          Import Data
        </label>
        <input id="importFile" type="file" accept=".json" hidden />
        <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
      </div>
    </section>

    <section class="stats">
      <div class="card stat">
        <div class="label">Total Monthly Bills</div>
        <div class="value accent-blue" id="statTotalBills">$0.00</div>
      </div>
      <div class="card stat">
        <div class="label">Paid This Month</div>
        <div class="value accent-green" id="statPaid">$0.00</div>
      </div>
      <div class="card stat">
        <div class="label">Remaining</div>
        <div class="value accent-red" id="statRemaining">$0.00</div>
      </div>
      <div class="card stat">
        <div class="label">Upcoming in 7 Days</div>
        <div class="value accent-yellow" id="statUpcoming">$0.00</div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-head">
          <h2 class="card-title" id="formTitle">Add New Bill</h2>
        </div>
        <div class="card-body">
          <form id="billForm">
            <input type="hidden" id="editId" />

            <div class="field">
              <label for="billName">Bill Name</label>
              <input id="billName" type="text" placeholder="Ex: Rent, Electric, Car Payment" required />
            </div>

            <div class="row-2">
              <div class="field">
                <label for="billAmount">Amount</label>
                <input id="billAmount" type="number" min="0" step="0.01" placeholder="0.00" required />
              </div>
              <div class="field">
                <label for="billDueDate">Due Date</label>
                <input id="billDueDate" type="date" required />
              </div>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="billCategory">Category</label>
                <select id="billCategory">
                  <option value="Housing">Housing</option>
                  <option value="Utilities">Utilities</option>
                  <option value="Transportation">Transportation</option>
                  <option value="Insurance">Insurance</option>
                  <option value="Phone/Internet">Phone/Internet</option>
                  <option value="Subscriptions">Subscriptions</option>
                  <option value="Debt">Debt</option>
                  <option value="Savings">Savings</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="field">
                <label for="billPriority">Priority</label>
                <select id="billPriority">
                  <option value="High">High</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="billNotes">Notes</label>
              <textarea id="billNotes" rows="3" placeholder="Optional notes"></textarea>
            </div>

            <div class="checkbox-row">
              <input id="billAutopay" type="checkbox" />
              <label for="billAutopay">Autopay Enabled</label>
            </div>

            <div class="checkbox-row">
              <input id="billPaid" type="checkbox" />
              <label for="billPaid">Already Paid</label>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary" id="saveBtn">Save Bill</button>
              <button type="button" class="btn btn-ghost" id="resetBtn">Reset</button>
            </div>
          </form>

          <div class="divider"></div>

          <div>
            <div class="card-title" style="margin-bottom:6px;">Monthly Progress</div>
            <div class="progress-shell">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-label" id="progressLabel">0% paid</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2 class="card-title">Bills Overview</h2>
        </div>
        <div class="card-body">
          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="Search bill name or category..." />
            <select id="statusFilter">
              <option value="all">All Statuses</option>
              <option value="paid">Paid</option>
              <option value="unpaid">Unpaid</option>
              <option value="overdue">Overdue</option>
              <option value="upcoming">Upcoming (7 days)</option>
            </select>
            <select id="sortBy">
              <option value="dueSoon">Sort: Due Soon</option>
              <option value="amountHigh">Sort: Amount High → Low</option>
              <option value="amountLow">Sort: Amount Low → High</option>
              <option value="nameAZ">Sort: Name A → Z</option>
            </select>
          </div>

          <div id="billList" class="bill-list"></div>
          <div class="footer-note">Data saves automatically in your browser.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    alert("Script Loaded");

    const STORAGE_KEY = "finance_command_center_bills_v1";

    const billForm = document.getElementById("billForm");
    const editId = document.getElementById("editId");
    const billName = document.getElementById("billName");
    const billAmount = document.getElementById("billAmount");
    const billDueDate = document.getElementById("billDueDate");
    const billCategory = document.getElementById("billCategory");
    const billPriority = document.getElementById("billPriority");
    const billNotes = document.getElementById("billNotes");
    const billAutopay = document.getElementById("billAutopay");
    const billPaid = document.getElementById("billPaid");
    const billList = document.getElementById("billList");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const sortBy = document.getElementById("sortBy");
    const formTitle = document.getElementById("formTitle");
    const saveBtn = document.getElementById("saveBtn");

    const statTotalBills = document.getElementById("statTotalBills");
    const statPaid = document.getElementById("statPaid");
    const statRemaining = document.getElementById("statRemaining");
    const statUpcoming = document.getElementById("statUpcoming");
    const progressBar = document.getElementById("progressBar");
    const progressLabel = document.getElementById("progressLabel");

    const exportBtn = document.getElementById("exportBtn");
    const importFile = document.getElementById("importFile");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const resetBtn = document.getElementById("resetBtn");

    let bills = loadBills();

    function loadBills(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      }catch(error){
        console.error("Failed to load bills:", error);
        return [];
      }
    }

    function saveBills(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bills));
    }

    function currency(value){
      return Number(value).toLocaleString("en-US", {
        style:"currency",
        currency:"USD"
      });
    }

    function todayStart(){
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function daysUntil(dateString){
      const today = todayStart();
      const due = new Date(dateString + "T00:00:00");
      const diffMs = due - today;
      return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
    }

    function getStatus(bill){
      if (bill.paid) return "paid";

      const days = daysUntil(bill.dueDate);

      if (days < 0) return "overdue";
      if (days <= 7) return "upcoming";
      return "unpaid";
    }

    function statusLabel(bill){
      const status = getStatus(bill);
      const days = daysUntil(bill.dueDate);

      if (status === "paid") return { text:"Paid", color:"green" };
      if (status === "overdue") return { text:`Overdue by ${Math.abs(days)} day${Math.abs(days) !== 1 ? "s" : ""}`, color:"red" };
      if (status === "upcoming") return { text:`Due in ${days} day${days !== 1 ? "s" : ""}`, color:"yellow" };
      return { text:"Upcoming Later", color:"blue" };
    }

    function priorityColor(priority){
      if (priority === "High") return "red";
      if (priority === "Medium") return "yellow";
      return "blue";
    }

    function resetForm(){
      billForm.reset();
      editId.value = "";
      formTitle.textContent = "Add New Bill";
      saveBtn.textContent = "Save Bill";
    }

    function fillForm(bill){
      editId.value = bill.id;
      billName.value = bill.name;
      billAmount.value = bill.amount;
      billDueDate.value = bill.dueDate;
      billCategory.value = bill.category;
      billPriority.value = bill.priority;
      billNotes.value = bill.notes || "";
      billAutopay.checked = !!bill.autopay;
      billPaid.checked = !!bill.paid;
      formTitle.textContent = "Edit Bill";
      saveBtn.textContent = "Update Bill";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateStats(){
      const total = bills.reduce((sum,b) => sum + Number(b.amount), 0);
      const paid = bills.filter(b => b.paid).reduce((sum,b) => sum + Number(b.amount), 0);
      const remaining = bills.filter(b => !b.paid).reduce((sum,b) => sum + Number(b.amount), 0);
      const upcoming = bills
        .filter(b => !b.paid && daysUntil(b.dueDate) >= 0 && daysUntil(b.dueDate) <= 7)
        .reduce((sum,b) => sum + Number(b.amount), 0);

      statTotalBills.textContent = currency(total);
      statPaid.textContent = currency(paid);
      statRemaining.textContent = currency(remaining);
      statUpcoming.textContent = currency(upcoming);

      const percent = total > 0 ? (paid / total) * 100 : 0;
      progressBar.style.width = `${percent.toFixed(0)}%`;
      progressLabel.textContent = `${percent.toFixed(0)}% paid`;
    }

    function filteredBills(){
      const search = searchInput.value.trim().toLowerCase();
      const filter = statusFilter.value;
      const sort = sortBy.value;

      let result = bills.filter(bill => {
        const combined = `${bill.name} ${bill.category} ${bill.notes || ""}`.toLowerCase();
        const matchesSearch = combined.includes(search);
        const status = getStatus(bill);
        const matchesFilter = filter === "all" ? true : status === filter;
        return matchesSearch && matchesFilter;
      });

      result.sort((a,b) => {
        if (sort === "amountHigh") return Number(b.amount) - Number(a.amount);
        if (sort === "amountLow") return Number(a.amount) - Number(b.amount);
        if (sort === "nameAZ") return a.name.localeCompare(b.name);
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      return result;
    }

    function renderBills(){
      updateStats();

      const items = filteredBills();

      if (!items.length){
        billList.innerHTML = `<div class="empty">No bills found. Add a bill or adjust your filters.</div>`;
        return;
      }

      billList.innerHTML = items.map(bill => {
        const status = statusLabel(bill);
        return `
          <div class="bill">
            <div class="bill-top">
              <div>
                <h3 class="bill-name">${escapeHtml(bill.name)}</h3>
                <div class="bill-meta">
                  <span>Due: ${formatDate(bill.dueDate)}</span>
                  <span>Category: ${escapeHtml(bill.category)}</span>
                </div>
              </div>
              <div class="amount">${currency(bill.amount)}</div>
            </div>

            <div class="pill-row">
              <span class="pill ${status.color}">${status.text}</span>
              <span class="pill ${priorityColor(bill.priority)}">Priority: ${escapeHtml(bill.priority)}</span>
              ${bill.autopay ? `<span class="pill purple">Autopay</span>` : ``}
            </div>

            ${bill.notes ? `<div class="small" style="margin-bottom:12px;">${escapeHtml(bill.notes)}</div>` : ``}

            <div class="bill-actions">
              ${
                bill.paid
                  ? `<button class="mini-btn unpay" onclick="togglePaid('${bill.id}')">Mark Unpaid</button>`
                  : `<button class="mini-btn pay" onclick="togglePaid('${bill.id}')">Mark Paid</button>`
              }
              <button class="mini-btn edit" onclick="editBill('${bill.id}')">Edit</button>
              <button class="mini-btn delete" onclick="deleteBill('${bill.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function formatDate(dateString){
      const date = new Date(dateString + "T00:00:00");
      return date.toLocaleDateString("en-US", {
        month:"short",
        day:"numeric",
        year:"numeric"
      });
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    billForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const payload = {
        id: editId.value || crypto.randomUUID(),
        name: billName.value.trim(),
        amount: Number(billAmount.value),
        dueDate: billDueDate.value,
        category: billCategory.value,
        priority: billPriority.value,
        notes: billNotes.value.trim(),
        autopay: billAutopay.checked,
        paid: billPaid.checked
      };

      if (!payload.name || !payload.amount || !payload.dueDate){
        alert("Please complete Bill Name, Amount, and Due Date.");
        return;
      }

      if (editId.value){
        bills = bills.map(b => b.id === payload.id ? payload : b);
      } else {
        bills.push(payload);
      }

      saveBills();
      resetForm();
      renderBills();
    });

    resetBtn.addEventListener("click", resetForm);

    searchInput.addEventListener("input", renderBills);
    statusFilter.addEventListener("change", renderBills);
    sortBy.addEventListener("change", renderBills);

    exportBtn.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(bills, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "finance-command-center-bills.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    importFile.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try{
          const parsed = JSON.parse(event.target.result);
          if (!Array.isArray(parsed)) throw new Error("Invalid format");
          bills = parsed;
          saveBills();
          renderBills();
          alert("Bills imported successfully.");
        }catch(error){
          alert("Import failed. Please use a valid JSON export file.");
        } finally {
          importFile.value = "";
        }
      };
      reader.readAsText(file);
    });

    clearAllBtn.addEventListener("click", () => {
      const confirmed = confirm("Clear all saved bills? This cannot be undone.");
      if (!confirmed) return;
      bills = [];
      saveBills();
      resetForm();
      renderBills();
    });

    window.togglePaid = function(id){
      bills = bills.map(b => b.id === id ? { ...b, paid: !b.paid } : b);
      saveBills();
      renderBills();
    }

    window.editBill = function(id){
      const bill = bills.find(b => b.id === id);
      if (!bill) return;
      fillForm(bill);
    }

    window.deleteBill = function(id){
      const bill = bills.find(b => b.id === id);
      const confirmed = confirm(`Delete "${bill?.name || "this bill"}"?`);
      if (!confirmed) return;
      bills = bills.filter(b => b.id !== id);
      saveBills();
      renderBills();
    }

    renderBills();
  </script>
</body>
</html>
