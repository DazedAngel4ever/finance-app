<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Command Center V4.4</title>

<style>
body {margin:0;background:#0b0f14;color:#e6edf3;font-family:system-ui;}
.wrap {padding:15px;max-width:700px;margin:auto;}
.title {font-size:26px;font-weight:800;margin-bottom:10px;}

.card {background:#161b22;padding:12px;border-radius:12px;margin-top:10px;}

input, select, button {
width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none;
background:#0f141b;color:white;
}
button {background:#238636;font-weight:700;}

.grid {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat {background:#111821;padding:10px;border-radius:10px;}
.stat-value {font-size:18px;font-weight:800;}

.progress {height:10px;background:#222;border-radius:10px;margin-top:10px;}
.progress-bar {height:100%;background:#2ea043;width:0%;}

.bill {background:#111821;padding:10px;border-radius:10px;margin-top:8px;}
.bill-top {display:flex;justify-content:space-between;}

.overdue {color:#ff6b6b;font-weight:700;}
.due {color:#f2cc60;}
.paid {color:#2ea043;}

canvas {width:100%;height:200px;margin-top:10px;}
</style>
</head>

<body>
<div class="wrap">

<div class="title">💳 Finance Command Center</div>

<div class="card">
<input id="income" placeholder="Monthly Income" type="number" oninput="render()">
</div>

<div class="card grid">
<div class="stat"><div>Total</div><div id="total" class="stat-value">$0</div></div>
<div class="stat"><div>Unpaid</div><div id="unpaid" class="stat-value">$0</div></div>
<div class="stat"><div>Overdue</div><div id="overdue" class="stat-value">0</div></div>
<div class="stat"><div>Leftover</div><div id="leftover" class="stat-value">$0</div></div>
</div>

<div class="card">
<div>Progress</div>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>

<div class="card">
<div>Spending Breakdown</div>
<canvas id="chart"></canvas>
</div>

<div class="card">
<div>Add Bill</div>
<input id="name" placeholder="Bill Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category">
<option>Rent</option>
<option>Utilities</option>
<option>Subscriptions</option>
<option>Debt</option>
<option>Other</option>
</select>

<label>
<input type="checkbox" id="recurring"> Recurring Monthly
</label>

<button onclick="addBill()">Add Bill</button>
</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script>
let bills = JSON.parse(localStorage.getItem("bills_v44")) || [];

function save(){localStorage.setItem("bills_v44",JSON.stringify(bills));}

function daysUntil(date){
return Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
}

/* SMART RECURRING */
function generateRecurring(){
let now=new Date();
let month=now.getMonth();
let year=now.getFullYear();

bills.forEach(b=>{
if(b.recurring && !b.generated){
let d=new Date(b.date);
let newDate=new Date(year,month,d.getDate());

let exists=bills.some(x=>x.name===b.name && x.date===newDate.toISOString().split("T")[0]);

if(!exists){
bills.push({...b,date:newDate.toISOString().split("T")[0],paid:false,recurring:false,generated:true});
}
}
});
}

/* ADD */
function addBill(){
let name=nameInput.value;
let amount=parseFloat(amountInput.value);
let date=dateInput.value;
let category=categoryInput.value;
let recurring=document.getElementById("recurring").checked;

if(!name||!amount||!date)return;

bills.push({name,amount,date,category,paid:false,recurring});
save();
render();
}

/* TOGGLE */
function toggle(i){bills[i].paid=!bills[i].paid;save();render();}

/* DELETE */
function removeBill(i){bills.splice(i,1);save();render();}

/* PRIORITY SORT */
function sortBills(a,b){
let aDays=daysUntil(a.date);
let bDays=daysUntil(b.date);

if(!a.paid && aDays<0) return -1;
if(!b.paid && bDays<0) return 1;

if(!a.paid && aDays<=3) return -1;
if(!b.paid && bDays<=3) return 1;

return aDays - bDays;
}

/* CHART */
function drawChart(catTotals){
let c=document.getElementById("chart");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let colors=["#2ea043","#58a6ff","#f2cc60","#ff6b6b","#8b5cf6"];
let i=0;
let x=20;

for(let cat in catTotals){
ctx.fillStyle=colors[i%colors.length];
ctx.fillRect(x,100,40,catTotals[cat]/5);
ctx.fillText(cat,x,90);
x+=60;
i++;
}
}

/* RENDER */
function render(){

generateRecurring();

let list=document.getElementById("list");
let income=parseFloat(income.value)||0;

let total=0,unpaid=0,overdue=0;
let catTotals={};

list.innerHTML="";

/* SORT */
bills.sort(sortBills);

bills.forEach((b,i)=>{
total+=b.amount;
if(!b.paid)unpaid+=b.amount;

let days=daysUntil(b.date);
if(!b.paid && days<0)overdue++;

catTotals[b.category]=(catTotals[b.category]||0)+b.amount;

let statusClass="";
let statusText="";

if(b.paid){statusClass="paid";statusText="Paid";}
else if(days<0){statusClass="overdue";statusText="OVERDUE";}
else if(days<=3){statusClass="due";statusText="Due Soon";}

let div=document.createElement("div");
div.className="bill";

div.innerHTML=`
<div class="bill-top">
<div>${b.name}</div>
<div>$${b.amount}</div>
</div>
<div>${b.category} | ${b.date}</div>
<div class="${statusClass}">${statusText}</div>
<button onclick="toggle(${i})">${b.paid?'Undo':'Pay'}</button>
<button onclick="removeBill(${i})">Delete</button>
`;

list.appendChild(div);
});

/* STATS */
document.getElementById("total").innerText="$"+total.toFixed(2);
document.getElementById("unpaid").innerText="$"+unpaid.toFixed(2);
document.getElementById("overdue").innerText=overdue;
document.getElementById("leftover").innerText="$"+(income-unpaid).toFixed(2);

/* PROGRESS */
let paid=total-unpaid;
let percent=total?(paid/total)*100:0;
document.getElementById("bar").style.width=percent+"%";

/* CHART */
drawChart(catTotals);
}

render();
</script>

</body>
</html>
